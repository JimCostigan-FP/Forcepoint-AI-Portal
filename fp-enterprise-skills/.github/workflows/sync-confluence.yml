name: Sync Skills Registry to Confluence

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  sync-confluence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate skills registry markdown
        run: python scripts/generate_registry.py > registry_output.md

      - name: Update Confluence Skills Registry page
        env:
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_SKILLS_PAGE_ID }}
        run: python scripts/update_confluence.py registry_output.md
